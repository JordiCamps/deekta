name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          if (-not $version) { $version = "1.0.0" }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish self-contained single-file exe
        run: >
          dotnet publish deekta.csproj -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: iscc /DMyAppVersion=${{ steps.ver.outputs.version }} installer\deekta.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: deekta ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            publish/deekta.exe
            installer/Output/deekta-setup.exe
